version: 2
updates:
  # Main project npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Minor and patch bumps land in a single PR; majors stay separate so
      # they can be reviewed with CI on their own (e.g. the TypeScript 7 jump).
      development:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Documentation site npm dependencies
  - package-ecosystem: "npm"
    directory: "/docs-src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "documentation"
    commit-message:
      prefix: "chore(docs-deps)"
    groups:
      documentation:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # Roll all action bumps into one PR instead of one per action.
      actions:
        patterns:
          - "*"
