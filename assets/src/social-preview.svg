    <circle r="50" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <circle r="34" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle r="10" fill="#60a5fa"/>
    <g fill="#34d399">
      <circle cx="0" cy="-50" r="4"/><circle cx="50" cy="0" r="4"/>
      <circle cx="0" cy="50" r="4"/><circle cx="-50" cy="0" r="4"/>
