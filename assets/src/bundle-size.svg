<!-- Data source: benchmarks/bundle-sizes.json (gzipped bytes, tree-shaken). Regenerate with `npm run bench:data`. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="bs-title bs-desc">
  <title id="bs-title">Gzipped bundle cost per function</title>
  <desc id="bs-desc">On a logarithmic scale, nano-string-utils and es-toolkit both sit near 100 to 330 bytes per function while lodash ranges from 1.7 KB to 3.5 KB.</desc>
  <style>
    .eyebrow{font:650 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.8px;fill:#60a5fa}
    .title{font:600 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
    .legend{font:500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
    .fn{font:600 16px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#e2e8f0}
    .val{font:500 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8}
    .val-win{font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#34d399}
    .tick{font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#64748b}
    .foot{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
    .grid{stroke:#1e293b;stroke-width:1}
  </style>

  <rect width="1200" height="600" rx="24" fill="#0f172a"/>
  <rect x="1" y="1" width="1198" height="598" rx="23" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="56" y="58" class="eyebrow">BUNDLE SIZE · GZIPPED · LOG SCALE</text>
  <text x="56" y="94" class="title">What one function costs you</text>

  <!-- legend -->
  <rect x="820" y="76" width="12" height="12" rx="3" fill="#34d399"/>
  <text x="840" y="87" class="legend">nano-string-utils</text>
  <rect x="982" y="76" width="12" height="12" rx="3" fill="#60a5fa"/>
  <text x="1002" y="87" class="legend">es-toolkit</text>
  <rect x="1090" y="76" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="1110" y="87" class="legend">lodash</text>

  <!-- gridlines -->
  <g class="grid">
    <line x1="200" y1="132" x2="200" y2="566"/>
    <line x1="350" y1="132" x2="350" y2="566"/>
    <line x1="500" y1="132" x2="500" y2="566"/>
    <line x1="650" y1="132" x2="650" y2="566"/>
    <line x1="800" y1="132" x2="800" y2="566"/>
    <line x1="950" y1="132" x2="950" y2="566"/>
    <line x1="1100" y1="132" x2="1100" y2="566"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="200" y="124">64 B</text>
    <text x="350" y="124">128 B</text>
    <text x="500" y="124">256 B</text>
    <text x="650" y="124">512 B</text>
    <text x="800" y="124">1 KB</text>
    <text x="950" y="124">2 KB</text>
    <text x="1100" y="124">4 KB</text>
  </g>

  <!-- camelCase -->
  <text x="180" y="186" class="fn" text-anchor="end">camelCase</text>
  <rect x="200" y="152" width="281" height="16" rx="4" fill="#34d399"/>
  <text x="491" y="165" class="val-win">235 B</text>
  <rect x="200" y="174" width="314" height="16" rx="4" fill="#60a5fa"/>
  <text x="524" y="187" class="val">273 B</text>
  <rect x="200" y="196" width="867" height="16" rx="4" fill="#f59e0b"/>
  <text x="1077" y="209" class="val">3.5 KB</text>

  <!-- kebabCase -->
  <text x="180" y="270" class="fn" text-anchor="end">kebabCase</text>
  <rect x="200" y="236" width="248" height="16" rx="4" fill="#34d399"/>
  <text x="458" y="249" class="val-win">201 B</text>
  <rect x="200" y="258" width="243" height="16" rx="4" fill="#60a5fa"/>
  <text x="453" y="271" class="val">197 B</text>
  <rect x="200" y="280" width="824" height="16" rx="4" fill="#f59e0b"/>
  <text x="1034" y="293" class="val">2.8 KB</text>

  <!-- capitalize -->
  <text x="180" y="354" class="fn" text-anchor="end">capitalize</text>
  <rect x="200" y="320" width="94" height="16" rx="4" fill="#34d399"/>
  <text x="304" y="333" class="val-win">99 B</text>
  <rect x="200" y="342" width="111" height="16" rx="4" fill="#60a5fa"/>
  <text x="321" y="355" class="val">107 B</text>
  <rect x="200" y="364" width="717" height="16" rx="4" fill="#f59e0b"/>
  <text x="927" y="377" class="val">1.7 KB</text>

  <!-- deburr -->
  <text x="180" y="438" class="fn" text-anchor="end">deburr</text>
  <rect x="200" y="404" width="314" height="16" rx="4" fill="#34d399"/>
  <text x="524" y="417" class="val-win">273 B</text>
  <rect x="200" y="426" width="356" height="16" rx="4" fill="#60a5fa"/>
  <text x="566" y="439" class="val">332 B</text>
  <rect x="200" y="448" width="731" height="16" rx="4" fill="#f59e0b"/>
  <text x="941" y="461" class="val">1.8 KB</text>

  <!-- truncate -->
  <text x="180" y="522" class="fn" text-anchor="end">truncate</text>
  <rect x="200" y="488" width="316" height="16" rx="4" fill="#34d399"/>
  <text x="526" y="501" class="val-win">276 B</text>
  <line x1="200" y1="518" x2="216" y2="518" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <text x="226" y="523" class="val">not in es-toolkit</text>
  <rect x="200" y="532" width="827" height="16" rx="4" fill="#f59e0b"/>
  <text x="1037" y="545" class="val">2.9 KB</text>

  <text x="56" y="586" class="foot">7–19× smaller than lodash on every function both libraries ship. Within a few bytes of es-toolkit.</text>
</svg>
